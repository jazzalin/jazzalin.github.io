<p>Ever since reading about this mathematical theory in James Gleick's <i>Chaos: Making a New Science</i>, I've been intrigued by the manifestation of <b>'chaos'</b> in dynamical systems (remember when Jeff Goldblum played Dr. Ian Malcolm, the chaos theorist, in Jurassic Park? Same idea). A system which is well known to showcase chaotic behaviour is the <b>double pendulum</b>. Comparing the determinism of the simple pendulum with the strong sensitivity to initial conditions of the double pendulum is fascinating. A numerical simulation of the double pendulum has been implemented in <b>Python</b> (using Plotly animation). The system of differential equations governing the motion of the double pendulum has been solved with a <b>4th order Runge-Kutta method</b>. A double pendulum made out of plexiglass is currently in the works (in the laser-cutting phase).
